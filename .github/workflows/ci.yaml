name: Helm Chart CI

on:
  pull_request:
    paths:
      - 'charts/**'
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add vm https://victoriametrics.github.io/helm-charts
          helm repo add percona https://percona.github.io/percona-helm-charts/
          helm repo add percona-olm https://percona.github.io/operator-lifecycle-manager
          helm repo update

      - name: Build chart dependencies
        run: |
          cd charts/everest
          helm dependency build .
          helm dependency build ./charts/everest-db-namespace
          helm dependency build ./charts/pmm3

      - name: Run helm lint
        run: |
          helm lint charts/everest --namespace everest-system

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run ct lint
        run: |
          ct lint \
            --charts charts/everest \
            --validate-maintainers=false

  test-values:
    name: Test Values
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add vm https://victoriametrics.github.io/helm-charts
          helm repo add percona https://percona.github.io/percona-helm-charts/
          helm repo add percona-olm https://percona.github.io/operator-lifecycle-manager
          helm repo update

      - name: Build chart dependencies
        run: |
          cd charts/everest
          helm dependency build .
          helm dependency build ./charts/everest-db-namespace
          helm dependency build ./charts/pmm3

      - name: Run helm template (default values)
        run: helm template test charts/everest --namespace everest-system

      - name: Run helm template (scheduling values)
        run: helm template test charts/everest --namespace everest-system -f charts/everest/ci/scheduling-values.yaml

      - name: Run helm template (tls values)
        run: helm template test charts/everest --namespace everest-system -f charts/everest/ci/tls-values.yaml

      - name: Run helm template (ingress values)
        run: helm template test charts/everest --namespace everest-system -f charts/everest/ci/ingress-values.yaml

      - name: Run helm template (rbac values)
        run: helm template test charts/everest --namespace everest-system -f charts/everest/ci/rbac-values.yaml
