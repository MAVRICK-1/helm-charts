ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: everest.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: everest-tls
      hosts:
        - everest.example.com
