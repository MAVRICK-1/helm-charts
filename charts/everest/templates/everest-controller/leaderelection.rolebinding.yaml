{{- if .Values.controller.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: everest-controller-leader-election-rolebinding
  namespace: {{ include "everest.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: everest-controller-leader-election-role
subjects:
- kind: ServiceAccount
  name: everest-controller-manager
  namespace: {{ include "everest.namespace" . }}
{{- end }}
