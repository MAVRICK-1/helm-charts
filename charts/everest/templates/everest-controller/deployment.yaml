{{- if .Values.controller.enabled }}
# This file is auto-generated from the openeverest repo's config/default/ via kustomize.
# Do not edit manually. Run: make controller-deployment-gen
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: everest-controller
  name: everest-controller
  namespace: {{ include "everest.namespace" . }}
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: everest-controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app: everest-controller
    spec:
      containers:
      - args:
        - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
        {{- if .Values.controller.leaderElection.enabled }}
        - --leader-elect
        {{- end }}
        - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
        - --monitoring-namespace={{ .Values.monitoring.namespaceOverride }}
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        command:
        - {{ .Values.controller.command }}
        {{- if .Values.controller.env }}
        env:
        {{- toYaml .Values.controller.env | nindent 8 }}
        {{- end }}
        image: {{ (default .Values.server.image .Values.controller.image) }}:{{ .Chart.AppVersion }}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 1
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
        resources: {{ toYaml .Values.controller.resources | nindent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: everest-controller-webhook-server-cert
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: everest-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: everest-controller-webhook-server-cert
        secret:
          secretName: everest-controller-webhook-server-cert
{{- end }}
