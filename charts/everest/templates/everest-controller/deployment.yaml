{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: everest-controller
  namespace: {{ include "everest.namespace" . }}
  labels:
    app: everest-controller
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: everest-controller
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: everest-controller
    spec:
      containers:
      - name: manager
        image: {{ (default .Values.server.image .Values.controller.image) }}:{{ .Chart.AppVersion }}
        imagePullPolicy: IfNotPresent
        command:
        - {{ .Values.controller.command }}
        args:
        {{- if .Values.controller.leaderElection.enabled }}
        - --leader-elect
        {{- end }}
        - --metrics-bind-address={{ .Values.controller.metricsBindAddress }}
        - --health-probe-bind-address={{ .Values.controller.healthProbeBindAddress }}
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
          timeoutSeconds: 1
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 1
        resources: {{ toYaml .Values.controller.resources | nindent 10 }}
        {{- if .Values.controller.env }}
        env:
        {{- toYaml .Values.controller.env | nindent 8 }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
      serviceAccountName: everest-controller-manager
      terminationGracePeriodSeconds: 10
{{- end }}
